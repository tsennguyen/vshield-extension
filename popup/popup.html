<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VShield — Kiểm tra</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <header class="popup-header">
      <div class="popup-brand">
        <svg width="24" height="28" viewBox="0 0 28 32" fill="none">
          <path d="M14 0L28 6V17C28 24.7 21.7 30.9 14 32C6.3 30.9 0 24.7 0 17V6L14 0Z" fill="url(#g)"/>
          <path d="M9 16.5L12.5 20L19.5 13" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="g" x1="0" y1="0" x2="28" y2="32" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2E5FA3"/><stop offset="100%" stop-color="#1B3A5C"/></linearGradient></defs>
        </svg>
        <div>
          <h1 class="popup-title">VShield</h1>
          <p class="popup-subtitle">Bảo vệ khỏi lừa đảo</p>
        </div>
      </div>
      <div class="header-stats">
        <span class="stat-badge">🛡️ <span id="scan-count">0</span> trang đã quét</span>
      </div>
    </header>

    <!-- Current Page Status -->
    <div id="page-status" class="page-status page-status--loading">
      <div class="status-icon" id="status-icon">
        <div class="scan-spinner"></div>
      </div>
      <div class="status-text">
        <span id="status-label" class="status-label">Đang quét...</span>
        <span id="status-url" class="status-url"></span>
        <span id="status-detail" class="status-detail"></span>
      </div>
    </div>

    <!-- Report current page button (shown only for dangerous) -->
    <button id="report-current" class="report-btn" hidden>
      🚩 Báo cáo trang này
    </button>

    <!-- Quick Check Form -->
    <div class="check-section">
      <div class="section-title">⚡ Kiểm tra nhanh</div>
      <div class="tab-group" role="tablist">
        <button class="tab-btn tab-btn--active" data-type="phone" role="tab" aria-selected="true">📞 SĐT</button>
        <button class="tab-btn" data-type="bank" role="tab">💳 STK</button>
        <button class="tab-btn" data-type="url" role="tab">🔗 URL</button>
      </div>

      <div class="input-group">
        <input type="text" id="check-input" class="check-input" placeholder="Nhập SĐT (0899... hoặc +84899...)" autocomplete="off" spellcheck="false">
        <button id="check-btn" class="check-btn" disabled>Kiểm tra</button>
      </div>

      <!-- Result -->
      <div id="check-result" class="check-result" hidden></div>
    </div>

    <!-- Settings -->
    <div class="settings-section">
      <div class="section-title">⚙️ Cài đặt</div>
      <label class="setting-row">
        <span class="setting-label">Tự động quét trang</span>
        <input type="checkbox" id="toggle-autoscan" class="toggle" checked>
      </label>
      <label class="setting-row">
        <span class="setting-label">Hiện cảnh báo overlay</span>
        <input type="checkbox" id="toggle-warning" class="toggle" checked>
      </label>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <a href="https://vshield-web.vercel.app/dashboard" target="_blank" rel="noopener" class="footer-link">
        Mở Dashboard ↗
      </a>
      <span class="footer-version">v3.0.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
